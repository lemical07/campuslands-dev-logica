name: Publish Docker package

on:
  push:
    branches:
      - main
      - dev
    paths:
      - Dockerfile.package
      - docker/**
      - docker-compose.yml
      - docs/DOCKER-PACKAGES.md
      - .github/workflows/publish-docker-package.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.package
          push: true
          build-args: |
            REPOSITORY_NAME=campuslands-dev-logica
            REPOSITORY_URL=https://github.com/anndreloopez012/campuslands-dev-logica
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
